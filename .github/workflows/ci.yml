name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check flake.nix version matches Cargo.toml
        run: |
          CARGO_VER=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          FLAKE_VER=$(grep -m1 'version = ' flake.nix | sed 's/.*"\(.*\)".*/\1/')
          echo "Cargo.toml=$CARGO_VER flake.nix=$FLAKE_VER"
          if [ "$CARGO_VER" != "$FLAKE_VER" ]; then
            echo "::error::version mismatch: Cargo.toml=$CARGO_VER flake.nix=$FLAKE_VER (update flake.nix)"
            exit 1
          fi
      - run: cargo fmt -- --check
      - run: cargo clippy -- -D warnings
      - run: cargo test
